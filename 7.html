<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rotfaden Kommunikation | Strategie & Klarheit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-color: #f4f4f4;
            --red-thread: #d32f2f;
            --font-main: 'Helvetica Neue', Arial, sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            font-family: var(--font-main);
            overflow-x: hidden;
        }

        #game-container {
            position: relative;
            width: 100%;
            height: 350px;
            cursor: none;
            border-bottom: 1px solid #ddd;
            background-color: var(--bg-color);
            touch-action: none; 
            overflow: hidden;
        }

        canvas { 
            display: block; 
            position: relative;
            z-index: 5;
            backface-visibility: hidden;
        }

        #ui-overlay {
            position: absolute;
            top: 15px;
            left: 20px;
            pointer-events: none;
            color: #333;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .score-box, .phase-box {
            font-size: 13px;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-weight: 400;
        }

        .phase-box {
            color: var(--red-thread);
            font-weight: 700;
        }

        #game-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            pointer-events: none;
            z-index: 20;
            display: none;
            width: 90%;
        }

        .milestone-text {
            color: #ffffff;
            font-size: clamp(1.5rem, 8vw, 4rem);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -1px;
            text-shadow: 0 5px 20px rgba(0,0,0,0.3);
            line-height: 1;
        }

        .float-animation {
            animation: dropAndFade 3s ease-out forwards;
        }

        @keyframes dropAndFade {
            0% { transform: translate(-50%, -150%); opacity: 0; }
            20% { transform: translate(-50%, -50%); opacity: 1; }
            80% { transform: translate(-50%, -50%); opacity: 1; }
            100% { transform: translate(-50%, -50%); opacity: 0; }
        }

        #win-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: none; flex-direction: column; justify-content: center; align-items: center;
            z-index: 100; background-color: var(--red-thread); color: white;
            text-align: center; padding: 20px; animation: fadeIn 0.8s forwards;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .win-title { font-size: clamp(2rem, 8vw, 3.5rem); font-weight: 900; margin-bottom: 10px; line-height: 1.1; letter-spacing: -1px; }
        .win-subtitle { font-size: 1.1rem; margin-bottom: 30px; font-weight: 300; opacity: 0.9; }
        .win-btn {
            background: white; color: var(--red-thread); padding: 16px 40px; border-radius: 0; font-weight: bold;
            text-transform: uppercase; letter-spacing: 2px; transition: all 0.3s; pointer-events: auto;
            text-decoration: none; font-size: 0.8rem;
        }
        .win-btn:hover { background: #333; color: white; transform: translateY(-3px); }
    </style>
</head>
<body>

<nav class="bg-white py-4 px-10 flex justify-between items-center shadow-sm">
    <div style="font-weight: 700; letter-spacing: -1px; font-size: 1.3rem;">
        ROTFADEN <span style="color: var(--red-thread);">KOMMUNIKATION</span>
    </div>
    <div class="hidden md:flex space-x-10 text-[10px] uppercase tracking-widest font-bold">
        <a href="#" class="hover:text-red-600 transition">Leistungen</a>
        <a href="#" class="hover:text-red-600 transition">Agentur</a>
        <a href="#" class="hover:text-red-600 transition">Kontakt</a>
    </div>
</nav>

<div id="game-container">
    <div id="ui-overlay">
        <div class="score-box">Punkte: <span id="score">0</span> / 700</div>
        <div class="phase-box" id="phase-display">Phase 0: Orientierung</div>
    </div>
    
    <div id="game-message">
        <div class="milestone-text" id="milestone-label">Start!</div>
    </div>

    <div id="win-screen">
        <h2 class="win-title">STRATEGIE STEHT.</h2>
        <p class="win-subtitle">Mensch und Marke perfekt verknüpft.</p>
        <a href="mailto:hallo@rotfaden.de" class="win-btn">Projekt starten</a>
    </div>

    <canvas id="gameCanvas"></canvas>
</div>

<main class="bg-white p-16 text-center">
    <h1 class="text-3xl md:text-5xl font-light mb-8 tracking-tight">
        Der <span style="color: var(--red-thread); font-weight: bold;">rote Faden</span> für Ihre Story.
    </h1>
    <p class="text-lg text-gray-500 leading-relaxed max-w-xl mx-auto">
        Wir entwirren komplexe Themen und weben daraus eine klare Strategie für Ihr Unternehmen.
    </p>
</main>

<script>
    const canvas = document.getElementById('gameCanvas');
    const container = document.getElementById('game-container');
    const ctx = canvas.getContext('2d');
    const scoreElement = document.getElementById('score');
    const phaseElement = document.getElementById('phase-display');
    const messageEl = document.getElementById('game-message');
    const labelEl = document.getElementById('milestone-label');
    const winScreen = document.getElementById('win-screen');

    let width, height, score = 0, lastMilestone = 0;
    let gameActive = true, finalCelebration = false;
    let mouse = { x: 0, y: 0 };
    
    // Physik & Optik aus der bevorzugten Version
    let snake = { segments: [], length: 20, baseWidth: 3, extraWidth: 0, speed: 0.15 };
    let particles = [], fireworks = [], pops = [];
    const colors = ['#3498db', '#f1c40f', '#9b59b6', '#2ecc71', '#e67e22', '#e74c3c', '#ffffff'];
    
    const phases = [
        "Phase 1: IST-Analyse",
        "Phase 2: Struktur",
        "Phase 3: Zielgruppen",
        "Phase 4: Kern-Botschaft",
        "Phase 5: Tonalität",
        "Phase 6: Kanäle",
        "Phase 7: Rollout"
    ];

    function init() {
        resize();
        mouse.x = width / 2; mouse.y = height / 2;
        for (let i = 0; i < snake.length; i++) snake.segments.push({ x: mouse.x, y: mouse.y });
        // Höhere Dichte zum Start
        for (let i = 0; i < 55; i++) spawnParticle(i % 8 === 0);
        animate();
    }

    function resize() {
        width = container.clientWidth;
        height = 350;
        canvas.width = width;
        canvas.height = height;
    }

    function spawnParticle(isRed = false) {
        particles.push({
            x: Math.random() * width, y: Math.random() * height,
            vx: (Math.random() - 0.5) * 1.5, vy: (Math.random() - 0.5) * 1.5,
            size: isRed ? 9 : 4,
            color: isRed ? '#d32f2f' : colors[Math.floor(Math.random() * colors.length)],
            isRed: isRed
        });
    }

    function createPop(x, y, color) {
        for(let i=0; i<8; i++) {
            pops.push({ x, y, vx: (Math.random()-0.5)*4, vy: (Math.random()-0.5)*4, life: 1.0, size: Math.random()*3+1, color });
        }
    }

    function createHugeExplosion() {
        const x = Math.random() * width;
        const y = Math.random() * height;
        const color = colors[Math.floor(Math.random() * colors.length)];
        const count = finalCelebration ? 75 : 15;
        
        for(let i=0; i < count; i++) {
            fireworks.push({
                x, y, 
                vx: (Math.random() - 0.5) * (finalCelebration ? 25 : 10), 
                vy: (Math.random() - 0.5) * (finalCelebration ? 25 : 10), 
                gravity: finalCelebration ? 0.12 : 0,
                life: 1.0, decay: finalCelebration ? 0.008 : 0.02,
                size: finalCelebration ? (Math.random() * 15 + 5) : 3, 
                color, angle: Math.random() * Math.PI * 2, spin: (Math.random() - 0.5) * 0.2
            });
        }
    }

    function checkMilestones() {
        let m = Math.floor(score / 100);
        if (m > lastMilestone && score < 700) {
            lastMilestone = m;
            let txt = phases[m - 1];
            phaseElement.innerText = txt;
            labelEl.innerText = txt.split(": ")[1]; 
            messageEl.style.display = "block";
            messageEl.classList.remove("float-animation");
            void messageEl.offsetWidth;
            messageEl.classList.add("float-animation");
            createHugeExplosion();
        }
        if (score >= 700 && gameActive) startFinal();
    }

    function startFinal() {
        gameActive = false; finalCelebration = true;
        phaseElement.innerText = "Phase 8: Finale!";
        labelEl.innerText = "BOTSCHAFT GEWEBT!";
        messageEl.style.display = "block";
        messageEl.classList.add("float-animation");

        let start = Date.now();
        const loop = setInterval(() => {
            let elapsed = Date.now() - start;
            // Explosionen nehmen an Fahrt auf
            const explosionsPerTick = Math.floor(elapsed / 700) + 1;
            for(let i=0; i < explosionsPerTick; i++) createHugeExplosion();
            
            if (elapsed > 3800) { clearInterval(loop); winScreen.style.display = 'flex'; }
        }, 140);
    }

    window.addEventListener('mousemove', (e) => {
        const r = canvas.getBoundingClientRect();
        mouse.x = e.clientX - r.left; mouse.y = e.clientY - r.top;
    });

    container.addEventListener('touchstart', (e) => {
        const r = canvas.getBoundingClientRect();
        mouse.x = e.touches[0].clientX - r.left;
        mouse.y = e.touches[0].clientY - r.top - 40;
        if(e.cancelable) e.preventDefault();
    }, { passive: false });

    container.addEventListener('touchmove', (e) => {
        const r = canvas.getBoundingClientRect();
        mouse.x = e.touches[0].clientX - r.left;
        mouse.y = e.touches[0].clientY - r.top - 40;
        if(e.cancelable) e.preventDefault();
    }, { passive: false });

    function update() {
        let h = { ...snake.segments[0] };
        h.x += (mouse.x - h.x) * snake.speed;
        h.y += (mouse.y - h.y) * snake.speed;
        snake.segments.unshift(h);
        while (snake.segments.length > snake.length) snake.segments.pop();

        if (gameActive) {
            // Immer genug Punkte halten
            if(particles.length < 50) spawnParticle(Math.random() < 0.15);
            
            // ESCALATION: Mehr rote Punkte pro Level
            let level = Math.floor(score / 100);
            let redNeeded = 2 + level; 
            if (particles.filter(p => p.isRed).length < redNeeded) spawnParticle(true);

            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx; p.y += p.vy;
                if (p.x < 0 || p.x > width) p.vx *= -1;
                if (p.y < 0 || p.y > height) p.vy *= -1;
                
                if (Math.hypot(h.x - p.x, h.y - p.y) < 15) {
                    createPop(p.x, p.y, p.color);
                    score += p.isRed ? 10 : 1;
                    snake.length += p.isRed ? 10 : 2;
                    if(p.isRed) snake.extraWidth += 0.5;
                    scoreElement.innerText = score;
                    particles.splice(i, 1);
                    checkMilestones();
                }
            }
        } else { particles.forEach(p => { p.x += p.vx; p.y += p.vy; }); }

        for (let i = fireworks.length - 1; i >= 0; i--) {
            let f = fireworks[i];
            f.x += f.vx; f.y += f.vy; 
            if(f.gravity) f.vy += f.gravity;
            if(f.spin) f.angle += f.spin;
            f.life -= f.decay;
            if (f.life <= 0) fireworks.splice(i, 1);
        }
        for (let i = pops.length - 1; i >= 0; i--) {
            pops[i].x += pops[i].vx; pops[i].y += pops[i].vy; pops[i].life -= 0.05;
            if (pops[i].life <= 0) pops.splice(i, 1);
        }
    }

    function draw() {
        ctx.clearRect(0, 0, width, height);
        
        pops.forEach(p => {
            ctx.globalAlpha = Math.max(0, p.life); ctx.fillStyle = p.color;
            ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
        });

        // Die beliebte Punkt-Optik (Ring mit weißem Punkt)
        ctx.globalAlpha = 1.0;
        particles.forEach(p => {
            ctx.beginPath(); ctx.strokeStyle = p.color; ctx.lineWidth = 2;
            ctx.arc(p.x, p.y, p.size / 2, 0, Math.PI * 2); ctx.stroke();
            ctx.beginPath(); ctx.fillStyle = 'rgba(255,255,255,0.8)';
            ctx.arc(p.x, p.y, 1, 0, Math.PI * 2); ctx.fill();
        });

        fireworks.forEach(f => {
            ctx.globalAlpha = Math.max(0, f.life); ctx.fillStyle = f.color;
            ctx.save(); ctx.translate(f.x, f.y); ctx.rotate(f.angle || 0);
            if (finalCelebration) {
                ctx.fillRect(-f.size/2, -f.size/4, f.size, f.size/2); 
            } else {
                ctx.fillRect(0, 0, f.size, f.size);
            }
            ctx.restore();
        });

        ctx.globalAlpha = 1.0;
        if (snake.segments.length > 1) {
            // Roter Faden
            ctx.beginPath(); ctx.strokeStyle = '#d32f2f';
            ctx.lineWidth = snake.baseWidth + Math.min(snake.extraWidth, 8);
            ctx.lineCap = 'round'; ctx.lineJoin = 'round';
            ctx.moveTo(snake.segments[0].x, snake.segments[0].y);
            for (let i = 1; i < snake.segments.length; i++) ctx.lineTo(snake.segments[i].x, snake.segments[i].y);
            ctx.stroke();

            // Glanz-Effekt auf dem Faden
            ctx.beginPath(); ctx.strokeStyle = 'rgba(255,255,255,0.3)';
            ctx.lineWidth = (snake.baseWidth + Math.min(snake.extraWidth, 8)) / 3;
            ctx.moveTo(snake.segments[0].x, snake.segments[0].y);
            for (let i = 1; i < snake.segments.length; i++) ctx.lineTo(snake.segments[i].x, snake.segments[i].y);
            ctx.stroke();
        }
    }

    function animate() { update(); draw(); requestAnimationFrame(animate); }
    window.addEventListener('resize', resize);
    init();
</script>

</body>
</html>
